    ],

      { id: 'MT-2', code: '2', title: 'Konsep Nombor', topic: 'Nombor Bulat' },
      { id: 'MT-3.1', code: '3.1', title: 'Nombor Bulat hingga 10', topic: 'Nombor Bulat' },
      { id: 'MT-3.2', code: '3.2', title: 'Nombor Bulat hingga 20', topic: 'Nombor Bulat' },
      { id: 'MT-3.3', code: '3.3', title: 'Nombor Bulat hingga 100', topic: 'Nombor Bulat' },
      { id: 'MT-3.4', code: '3.4', title: 'Nombor Bulat hingga 1000', topic: 'Nombor Bulat' },
      { id: 'MT-4.1', code: '4.1', title: 'Tambah dalam lingkungan 10', topic: 'Tambah' },
      { id: 'MT-4.2', code: '4.2', title: 'Tambah dalam lingkungan 18', topic: 'Tambah' },
      { id: 'MT-4.3', code: '4.3', title: 'Tambah dalam lingkungan 100', topic: 'Tambah' },
      { id: 'MT-4.4', code: '4.4', title: 'Tambah dalam lingkungan 1000', topic: 'Tambah' },
      { id: 'MT-5.1', code: '5.1', title: 'Tolak dalam lingkungan 10', topic: 'Tolak' },
      { id: 'MT-5.2', code: '5.2', title: 'Tolak dalam lingkungan 18', topic: 'Tolak' },
      { id: 'MT-5.3', code: '5.3', title: 'Tolak dalam lingkungan 100', topic: 'Tolak' },
      { id: 'MT-5.4', code: '5.4', title: 'Tolak dalam lingkungan 1000', topic: 'Tolak' },
      { id: 'MT-6', code: '6', title: 'Operasi Darab', topic: 'Operasi' },
      { id: 'MT-7', code: '7', title: 'Operasi Bahagi', topic: 'Operasi' },
      { id: 'MT-8.1', code: '8.1', title: 'Wang sehingga RM10', topic: 'Wang dan Masa' },
      { id: 'MT-8.2', code: '8.2', title: 'Wang sehingga RM100', topic: 'Wang dan Masa' },
      { id: 'MT-8.3', code: '8.3', title: 'Wang sehingga RM1000', topic: 'Wang dan Masa' },
      { id: 'MT-9', code: '9', title: 'Masa dan Waktu', topic: 'Wang dan Masa' }
    ]
  };

  const state = {
    options: { kemahiranBySubject: {} },
    access: { verified: false, canEnterData: false, canViewAnalytics: true, email: '' },
    sessions: [],
    roster: [],
    studentGroupSettings: [],
    teacherSchedules: [],
    dashboardData: null
  };

  const el = {
    dateInput: document.getElementById('dateInput'),
    sessionSelect: document.getElementById('sessionSelect'),
    rosterBody: document.getElementById('rosterBody'),
    accessInfo: document.getElementById('accessInfo'),
    status: document.getElementById('status'),
    attendancePanel: document.getElementById('attendancePanel'),
    settingsPanel: document.getElementById('settingsPanel'),
    schedulePanel: document.getElementById('schedulePanel'),
    settingsBody: document.getElementById('settingsBody'),
    settingsStatus: document.getElementById('settingsStatus'),
    scheduleBody: document.getElementById('scheduleBody'),
    scheduleStatus: document.getElementById('scheduleStatus'),
    dashboardPanel: document.getElementById('dashboardPanel'),
    dashStudentSelect: document.getElementById('dashStudentSelect'),
    dashMonthInput: document.getElementById('dashMonthInput'),
    dashboardCards: document.getElementById('dashboardCards'),
    dashboardStatus: document.getElementById('dashboardStatus')
  };

  document.getElementById('openAttendanceTabBtn').addEventListener('click', () => showPanel('attendance'));
  document.getElementById('openDashboardTabBtn').addEventListener('click', () => showPanel('dashboard'));
  document.getElementById('openSettingsTabBtn').addEventListener('click', () => showPanel('settings'));
  document.getElementById('openScheduleTabBtn').addEventListener('click', () => showPanel('schedule'));
  document.getElementById('saveAttendanceBtn').addEventListener('click', saveAttendance);
  document.getElementById('markPresentBtn').addEventListener('click', () => markAll('present'));
  document.getElementById('markAbsentBtn').addEventListener('click', () => markAll('absent'));
  document.getElementById('markExcusedBtn').addEventListener('click', () => markAll('excused'));
  document.getElementById('loadSettingsBtn').addEventListener('click', loadStudentGroupSettings);
  document.getElementById('addStudentBtn').addEventListener('click', addStudentPrompt);
  document.getElementById('removeStudentsBtn').addEventListener('click', removeSelectedStudents);
  document.getElementById('saveSettingsBtn').addEventListener('click', saveStudentGroupSettings);
  document.getElementById('loadScheduleBtn').addEventListener('click', loadTeacherSchedules);
  document.getElementById('addScheduleRowBtn').addEventListener('click', addScheduleRow);
  document.getElementById('saveScheduleBtn').addEventListener('click', saveTeacherSchedules);
  document.getElementById('dashPdfBtn').addEventListener('click', () => window.print());
  document.getElementById('dashPrintAllBtn').addEventListener('click', printAllStudentsDashboard);
  el.dateInput.addEventListener('change', loadSessions);
  el.sessionSelect.addEventListener('change', loadRoster);
  el.dashStudentSelect.addEventListener('change', loadDashboard);
  el.dashMonthInput.addEventListener('change', loadDashboard);

  bootstrap();

  function bootstrap() {
    setStatus('Memuat tetapan...');
    google.script.run
      .withSuccessHandler((data) => {
        state.options = data.options || state.options;
        state.access = data.access || state.access;
        el.dateInput.value = data.today;
        renderAccess();
        initDashboardControls();
        setStatus('Memuat sesi...');
        loadSessions();
      })
      .withFailureHandler(handleError)
      .getBootstrapData();
  }

  function showPanel(type) {
    el.attendancePanel.classList.toggle('hidden', type !== 'attendance');
    el.dashboardPanel.classList.toggle('hidden', type !== 'dashboard');
    el.settingsPanel.classList.toggle('hidden', type !== 'settings');
    el.schedulePanel.classList.toggle('hidden', type !== 'schedule');
  }

  function initDashboardControls() {
    const now = new Date();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    el.dashMonthInput.value = `${now.getFullYear()}-${m}`;

    google.script.run
      .withSuccessHandler((res) => {
        const rows = res.rows || [];
        el.dashStudentSelect.innerHTML = '<option value="">Pilih murid</option>';
        rows.forEach((r) => {
          const opt = document.createElement('option');
          opt.value = r.studentId || r.id;
          opt.textContent = `${r.fullName || r.studentName} (${r.className || r.classId || '-'})`;
          el.dashStudentSelect.appendChild(opt);
        });
        if (rows.length) {
          el.dashStudentSelect.value = rows[0].studentId || rows[0].id;
          loadDashboard();
        }
      })
      .withFailureHandler((err) => setDashboardStatus(getErrMsg(err), true))
      .getStudentGroupSettings();
  }

  function loadDashboard() {
    const studentId = el.dashStudentSelect.value;
    const month = el.dashMonthInput.value;
    if (!studentId || !month) return;
    setDashboardStatus('Memuat dashboard...');
    google.script.run
      .withSuccessHandler((res) => {
        state.dashboardData = res;
        renderDashboard(res);
        setDashboardStatus('Dashboard siap.');
      })
      .withFailureHandler((err) => setDashboardStatus(getErrMsg(err), true))
      .getAttendanceDashboard({ studentId, month });
  }

  function renderDashboard(data) {
    const subjects = (data && data.subjects) ? data.subjects : [];
    if (!subjects.length) {
      el.dashboardCards.innerHTML = '<div class="muted">Tiada data subjek untuk murid ini.</div>';
      return;
    }
    el.dashboardCards.innerHTML = subjects.map((s) => `
      <div class="card">
        <h3 class="kpi-title">${escapeHtml(s.code)}</h3>
        <div class="kpi-boxes">
          <div class="kpi-box gauge" style="${gaugeStyle(s.selectedPercent)}">
            <div class="kpi-label">Peratus Bulan Dipilih</div>
            <div class="kpi-value">${Number(s.selectedPercent || 0)}%</div>
          </div>
          <div class="kpi-box gauge" style="${gaugeStyle(s.totalPercent)}">
            <div class="kpi-label">Peratus Keseluruhan</div>
            <div class="kpi-value">${Number(s.totalPercent || 0)}%</div>
          </div>
        </div>
        <div><strong>Kemahiran Terkini:</strong> ${escapeHtml(s.latestKemahiran || '-')}</div>
      </div>
    `).join('');
  }

  function printAllStudentsDashboard() {
    const opts = Array.from(el.dashStudentSelect.options).filter(o => o.value);
    if (!opts.length) return;
    const month = el.dashMonthInput.value;
    setDashboardStatus('Menjana paparan semua murid...');
    let html = '<html><head><title>Peratus Kehadiran Semua Murid</title></head><body>';
    const run = (i) => {
      if (i >= opts.length) {
        html += '</body></html>';
        const w = window.open('', '_blank');
        w.document.write(html);
        w.document.close();
        w.focus();
        w.print();
        setDashboardStatus('Selesai jana semua murid.');
        return;
      }
      const sid = opts[i].value;
      google.script.run
        .withSuccessHandler((res) => {
          const name = (res.student && res.student.fullName) ? res.student.fullName : sid;
          html += `<h2>${escapeHtml(name)} (${escapeHtml(month)})</h2>`;
          (res.subjects || []).forEach((s) => {
            html += `<p><strong>${escapeHtml(s.code)}</strong> | Bulan: ${Number(s.selectedPercent || 0)}% | Total: ${Number(s.totalPercent || 0)}% | Kemahiran: ${escapeHtml(s.latestKemahiran || '-')}</p>`;
          });
          html += '<hr/>';
          run(i + 1);
        })
        .withFailureHandler(() => run(i + 1))
        .getAttendanceDashboard({ studentId: sid, month });
    };
    run(0);
  }

  function loadSessions() {
    let date = el.dateInput.value;
    if (!date) {
      const todayIso = new Date().toISOString().slice(0, 10);
      el.dateInput.value = todayIso;
      date = todayIso;
    }

    setStatus('Memuat sesi jadual...');
    google.script.run
      .withSuccessHandler((res) => {
        state.sessions = res.sessions || [];
        fillSessions();
        if (state.sessions.length > 0) {
          el.sessionSelect.value = state.sessions[0].id;
          setStatus(`Dimuat ${state.sessions.length} sesi. Memuat senarai murid...`);
          loadRoster();
        } else {
          state.roster = [];
          renderRoster();
          setStatus('Tiada sesi untuk tarikh dipilih.');
        }
      })
      .withFailureHandler(handleError)
      .getSessions({ date });
  }

  function fillSessions() {
    el.sessionSelect.innerHTML = '<option value="">Pilih sesi</option>';
    state.sessions.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      const label = `${s.className} - ${s.subjectCode}`;
      opt.textContent = label;
      el.sessionSelect.appendChild(opt);
    });
  }

  function loadRoster() {
    const sessionId = el.sessionSelect.value;
    if (!sessionId) {
      state.roster = [];
      renderRoster();
      setStatus('Pilih sesi dahulu.', true);
      return;
    }

    setStatus('Memuat senarai kehadiran...');
    google.script.run
      .withSuccessHandler((res) => {
        state.roster = (res.roster || []).map(r => ({
          ...r,
          attendanceStatus: r.attendanceStatus || 'present',
          kemahiranDraft: {
            kemahiranId: '',
            masteryLevel: 'developing',
            score: '',
            observedInterest: '3',
            teacherNote: ''
          }
        }));
        renderRoster();
        applyAccessRules();
        if (state.roster.length) {
          setStatus(`Senarai siap: ${state.roster.length} murid.`);
        } else {
          const d = res.debug || {};
          setStatus(
            `Senarai siap: 0 murid. Debug -> kelas:${d.classMatched || 0}, subjek:${d.subjectMatched || 0}, tarikh:${d.dateMatched || 0} (enrolmen aktif:${d.enrollmentsActive || 0})`,
            true
          );
        }
      })
      .withFailureHandler(handleError)
      .getAttendanceRoster({ sessionId });
  }

  function loadStudentGroupSettings() {
    setSettingsStatus('Memuat murid...');
    google.script.run
      .withSuccessHandler((res) => {
        state.studentGroupSettings = res.rows || [];
        renderStudentGroupSettings();
        setSettingsStatus(`Dimuat ${state.studentGroupSettings.length} murid.`);
      })
      .withFailureHandler((err) => setSettingsStatus(getErrMsg(err), true))
      .getStudentGroupSettings();
  }

  function renderStudentGroupSettings() {
    if (!state.studentGroupSettings.length) {
      el.settingsBody.innerHTML = '<tr><td colspan="4" class="muted">Tiada data murid dijumpai.</td></tr>';
      return;
    }
    el.settingsBody.innerHTML = '';
    state.studentGroupSettings.forEach((row, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="checkbox" data-role="student-select" data-idx="${idx}" /></td>
        <td>
          <strong>${escapeHtml(row.fullName || row.studentName || '')}</strong>
          <div class="row-meta">ID: ${escapeHtml(String(row.studentId || row.id || ''))}</div>
        </td>
        <td>${escapeHtml(row.className || row.classId || '-')}</td>
        <td>
          <select data-role="group-setting" data-idx="${idx}">
            <option value="BM" ${selected(normalizeGroup(row.groupMode), 'BM')}>BM</option>
            <option value="MT" ${selected(normalizeGroup(row.groupMode), 'MT')}>MT</option>
            <option value="BOTH" ${selected(normalizeGroup(row.groupMode), 'BOTH')}>Kedua-dua</option>
            <option value="PERDANA" ${selected(normalizeGroup(row.groupMode), 'PERDANA')}>Perdana</option>
          </select>
        </td>
      `;
      el.settingsBody.appendChild(tr);
    });
    el.settingsBody.querySelectorAll('select[data-role="group-setting"]').forEach((node) => {
      node.addEventListener('change', onGroupSettingChange);
    });
  }

  function onGroupSettingChange(e) {
    const idx = Number(e.target.dataset.idx);
    state.studentGroupSettings[idx].groupMode = e.target.value;
  }

  function saveStudentGroupSettings() {
    if (!state.access.canEnterData) {
      setSettingsStatus('Akaun anda belum disahkan untuk kemasukan data.', true);
      return;
    }
    const rows = state.studentGroupSettings.map((r) => ({
      studentId: r.studentId || r.id,
      classId: r.classId,
      groupMode: normalizeGroup(r.groupMode)
    }));
    setSettingsStatus('Menyimpan tetapan kumpulan...');
    google.script.run
      .withSuccessHandler(() => setSettingsStatus(`Disimpan ${rows.length} tetapan kumpulan murid.`))
      .withFailureHandler((err) => setSettingsStatus(getErrMsg(err), true))
      .saveStudentGroupSettings({ rows });
  }

  function addStudentPrompt() {
    if (!state.access.canEnterData) {
      setSettingsStatus('Akaun anda belum disahkan untuk kemasukan data.', true);
      return;
    }
    const studentId = (prompt('ID Murid (contoh: S022):') || '').trim();
    const fullName = (prompt('Nama penuh murid:') || '').trim();
    const classId = (prompt('Kelas (contoh: 3 LILY):') || '').trim();
    const mode = normalizeGroup((prompt('Kumpulan: BM / MT / BOTH / PERDANA', 'BM') || 'BM').trim());
    if (!studentId || !fullName || !classId) {
      setSettingsStatus('Tambah murid dibatalkan: maklumat wajib tidak lengkap.', true);
      return;
    }
    setSettingsStatus('Menambah murid...');
    google.script.run
      .withSuccessHandler(() => {
        setSettingsStatus(`Murid ${studentId} berjaya ditambah.`);
        loadStudentGroupSettings();
      })
      .withFailureHandler((err) => setSettingsStatus(getErrMsg(err), true))
      .addStudent({ studentId, fullName, classId, groupMode: mode });
  }

  function removeSelectedStudents() {
    if (!state.access.canEnterData) {
      setSettingsStatus('Akaun anda belum disahkan untuk kemasukan data.', true);
      return;
    }
    const selectedIndexes = Array.from(el.settingsBody.querySelectorAll('input[data-role="student-select"]:checked'))
      .map(node => Number(node.dataset.idx));
    if (!selectedIndexes.length) {
      setSettingsStatus('Pilih sekurang-kurangnya satu murid untuk dibuang.', true);
      return;
    }
    const ids = selectedIndexes
      .map(i => state.studentGroupSettings[i] && (state.studentGroupSettings[i].studentId || state.studentGroupSettings[i].id))
      .filter(Boolean);
    if (!ids.length) return;
    if (!confirm(`Buang ${ids.length} murid? Ini juga akan membuang enrolmen mereka.`)) return;
    setSettingsStatus('Membuang murid...');
    google.script.run
      .withSuccessHandler(() => {
        setSettingsStatus(`${ids.length} murid telah dibuang.`);
        loadStudentGroupSettings();
      })
      .withFailureHandler((err) => setSettingsStatus(getErrMsg(err), true))
      .removeStudents({ studentIds: ids });
  }

  function loadTeacherSchedules() {
    setScheduleStatus('Memuat jadual...');
    google.script.run
      .withSuccessHandler((res) => {
        state.teacherSchedules = (res.rows || []).map((r) => ({
          ...r,
          groupCode: String(r.groupCode || 'BM').toUpperCase()
        }));
        renderTeacherSchedules();
        setScheduleStatus(`Dimuat ${state.teacherSchedules.length} baris jadual.`);
      })
      .withFailureHandler((err) => setScheduleStatus(getErrMsg(err), true))
      .getTeacherSchedules();
  }

  function renderTeacherSchedules() {
    if (!state.teacherSchedules.length) {
      el.scheduleBody.innerHTML = '<tr><td colspan="6" class="muted">Belum ada jadual. Klik Tambah Baris.</td></tr>';
      return;
    }
    el.scheduleBody.innerHTML = '';
    state.teacherSchedules.forEach((row, idx) => {
      const currentGroup = String(row.groupCode || row.subjectCode || 'BM').toUpperCase();
      state.teacherSchedules[idx].groupCode = currentGroup;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input data-role="sch-class" data-idx="${idx}" value="${escapeHtml(row.classId || row.className || '')}" placeholder="CLS_3_LILY atau 3 LILY" /></td>
        <td>
          <select data-role="sch-group" data-idx="${idx}">
            <option value="BM" ${selected(currentGroup, 'BM')}>BM</option>
            <option value="MT" ${selected(currentGroup, 'MT')}>MT</option>
          </select>
        </td>
        <td>
          <select data-role="sch-day" data-idx="${idx}">
            ${dayOptions(row.dayOfWeek)}
          </select>
        </td>
        <td><input data-role="sch-start" data-idx="${idx}" type="time" value="${escapeHtml(row.startTime || '')}" /></td>
        <td><input data-role="sch-end" data-idx="${idx}" type="time" value="${escapeHtml(row.endTime || '')}" /></td>
        <td><input data-role="sch-active" data-idx="${idx}" type="checkbox" ${row.isActive === false ? '' : 'checked'} /></td>
      `;
      el.scheduleBody.appendChild(tr);
    });

    el.scheduleBody.querySelectorAll('[data-role^="sch-"]').forEach((node) => {
      const evt = node.type === 'checkbox' ? 'change' : 'input';
      node.addEventListener(evt, onScheduleChange);
    });
    applyAccessRules();
  }

  function addScheduleRow() {
    state.teacherSchedules.push({
      classId: '',
      groupCode: 'BM',
      dayOfWeek: '1',
      startTime: '08:00',
      endTime: '09:00',
      isActive: true
    });
    renderTeacherSchedules();
  }

  function onScheduleChange(e) {
    const idx = Number(e.target.dataset.idx);
    const role = e.target.dataset.role;
    const val = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
    if (role === 'sch-class') state.teacherSchedules[idx].classId = val;
    if (role === 'sch-group') state.teacherSchedules[idx].groupCode = String(val || '').toUpperCase();
    if (role === 'sch-day') state.teacherSchedules[idx].dayOfWeek = val;
    if (role === 'sch-start') state.teacherSchedules[idx].startTime = val;
    if (role === 'sch-end') state.teacherSchedules[idx].endTime = val;
    if (role === 'sch-active') state.teacherSchedules[idx].isActive = Boolean(val);
  }

  function saveTeacherSchedules() {
    if (!state.access.canEnterData) {
      setScheduleStatus('Akaun anda belum disahkan untuk kemasukan data.', true);
      return;
    }
    const rows = state.teacherSchedules
      .filter(r => r.classId && r.groupCode && r.dayOfWeek && r.startTime && r.endTime)
      .map(r => ({
        id: r.id || '',
        classId: r.classId,
        groupCode: String(r.groupCode || 'BM').toUpperCase(),
        dayOfWeek: Number(r.dayOfWeek),
        startTime: r.startTime,
        endTime: r.endTime,
        isActive: r.isActive !== false
      }));
    setScheduleStatus('Menyimpan jadual...');
    google.script.run
      .withSuccessHandler(() => setScheduleStatus(`Disimpan ${rows.length} baris jadual.`))
      .withFailureHandler((err) => setScheduleStatus(getErrMsg(err), true))
      .saveTeacherSchedules({ rows });
  }

  function renderRoster() {
    if (!state.roster.length) {
      el.rosterBody.innerHTML = '<tr><td colspan="5" class="muted">Tiada murid dalam sesi ini.</td></tr>';
      return;
    }

    el.rosterBody.innerHTML = '';
    state.roster.forEach((row, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <strong>${escapeHtml(row.studentName)}</strong>
          <div class="row-meta">ID: ${escapeHtml(String(row.studentId))}</div>
        </td>
        <td>${escapeHtml(row.className || '-')}</td>
        <td><span class="pill">${escapeHtml(row.subjectCode || '-')}</span></td>
        <td>
          <select data-role="attendance" data-idx="${idx}">
            <option value="present" ${selected(row.attendanceStatus, 'present')}>Hadir</option>
            <option value="absent" ${selected(row.attendanceStatus, 'absent')}>Tidak Hadir</option>
            <option value="late" ${selected(row.attendanceStatus, 'late')}>Lewat</option>
            <option value="excused" ${selected(row.attendanceStatus, 'excused')}>Bersebab</option>
          </select>
        </td>
        <td>
          <div class="grid">
            <select data-role="kemahiran" data-idx="${idx}">
              <option value="">Kemahiran</option>
              ${kemahiranOptions(row.subjectId, row.subjectCode)}
            </select>
            <select data-role="mastery" data-idx="${idx}">
              <option value="not_yet">Belum Kuasai</option>
              <option value="developing" selected>Sedang Kuasai</option>
              <option value="mastered">Telah Kuasai</option>
            </select>
            <input data-role="score" data-idx="${idx}" type="number" min="0" max="100" placeholder="Skor" />
            <select data-role="interest" data-idx="${idx}">
              <option value="1">Minat 1</option>
              <option value="2">Minat 2</option>
              <option value="3" selected>Minat 3</option>
              <option value="4">Minat 4</option>
              <option value="5">Minat 5</option>
            </select>
            <textarea data-role="note" data-idx="${idx}" rows="2" placeholder="Catatan guru"></textarea>
          </div>
        </td>
      `;
      el.rosterBody.appendChild(tr);
    });

    el.rosterBody.querySelectorAll('select[data-role="attendance"]').forEach(node => {
      node.addEventListener('change', onAttendanceChange);
    });
    el.rosterBody.querySelectorAll('[data-role]').forEach(node => {
      if (node.dataset.role !== 'attendance') {
        node.addEventListener('change', onKemahiranDraftChange);
        if (node.tagName === 'TEXTAREA') {
          node.addEventListener('input', onKemahiranDraftChange);
        }
      }
    });
  }

  function onAttendanceChange(e) {
    const idx = Number(e.target.dataset.idx);
    state.roster[idx].attendanceStatus = e.target.value;
  }

  function onKemahiranDraftChange(e) {
    const idx = Number(e.target.dataset.idx);
    const role = e.target.dataset.role;
    const val = e.target.value;
    if (role === 'kemahiran') state.roster[idx].kemahiranDraft.kemahiranId = val;
    if (role === 'mastery') state.roster[idx].kemahiranDraft.masteryLevel = val;
    if (role === 'score') state.roster[idx].kemahiranDraft.score = val;
    if (role === 'interest') state.roster[idx].kemahiranDraft.observedInterest = val;
    if (role === 'note') state.roster[idx].kemahiranDraft.teacherNote = val;
  }

  function markAll(status) {
    if (!state.access.canEnterData) return;
    state.roster.forEach(r => r.attendanceStatus = status);
    el.rosterBody.querySelectorAll('select[data-role="attendance"]').forEach(node => {
      node.value = status;
    });
  }

  function saveAttendance() {
    if (!state.access.canEnterData) {
      setStatus('Akaun anda belum disahkan untuk kemasukan data.', true);
      return;
    }
    const sessionId = el.sessionSelect.value;
    if (!sessionId) {
      setStatus('Pilih sesi sebelum simpan.', true);
      return;
    }

    const records = state.roster.map(r => ({
      studentId: r.studentId,
      attendanceStatus: r.attendanceStatus
    }));

    setStatus('Menyimpan kehadiran...');
    google.script.run
      .withSuccessHandler(() => saveKemahiranBatch(sessionId))
      .withFailureHandler(handleError)
      .saveAttendance({ sessionId, records });
  }

  function saveKemahiranBatch(sessionId) {
    const attempts = state.roster
      .filter(r => r.kemahiranDraft.kemahiranId)
      .map(r => ({
        studentId: r.studentId,
        kemahiranId: r.kemahiranDraft.kemahiranId,
        sessionId,
        attemptDate: el.dateInput.value,
        masteryLevel: r.kemahiranDraft.masteryLevel,
        score: r.kemahiranDraft.score ? Number(r.kemahiranDraft.score) : null,
        observedInterest: Number(r.kemahiranDraft.observedInterest),
        teacherNote: r.kemahiranDraft.teacherNote
      }));

    if (!attempts.length) {
      setStatus('Kehadiran disimpan. Tiada kemahiran dipilih.');
      return;
    }

    setStatus('Menyimpan rekod kemahiran...');
    runSequential(attempts, (item) => {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .saveKemahiranAttempt(item);
      });
    })
    .then(() => setStatus(`Kehadiran disimpan + ${attempts.length} rekod kemahiran.`))
    .catch(handleError);
  }

  function runSequential(list, handler) {
    return list.reduce((p, item) => p.then(() => handler(item)), Promise.resolve());
  }

  function kemahiranOptions(subjectId, subjectCode) {
    const backendList = (state.options.kemahiranBySubject || {})[subjectId] || [];
    const code = String(subjectCode || '').toUpperCase();
    const localList = LOCAL_KEMAHIRAN_CATALOG[code] || [];
    const list = backendList.length ? backendList : localList;
    return list.map(k => {
      const topic = k.topic ? ` [${k.topic}]` : '';
      return `<option value="${escapeHtml(String(k.id))}">${escapeHtml(k.code + ' - ' + k.title + topic)}</option>`;
    }).join('');
  }

  function selected(current, expected) {
    return current === expected ? 'selected' : '';
  }

  function setStatus(msg, isError) {
    el.status.textContent = msg;
    el.status.style.color = isError ? '#d64550' : '#6a767d';
  }

  function renderAccess() {
    const a = state.access || {};
    if (!a.email) {
      el.accessInfo.textContent = 'Akses: Lihat sahaja (emel Google tidak dikesan).';
      el.accessInfo.style.color = '#d64550';
      applyAccessRules();
      return;
    }
    if (!a.verified || !a.canEnterData) {
      el.accessInfo.textContent = `Log masuk: ${a.email} | Akses: Lihat sahaja. ${a.reason || ''}`.trim();
      el.accessInfo.style.color = '#d64550';
      applyAccessRules();
      return;
    }
    el.accessInfo.textContent = `Log masuk: ${a.email} | Akses: Kemasukan data disahkan${a.role ? ' (' + a.role + ')' : ''}.`;
    el.accessInfo.style.color = '#1f6b46';
    applyAccessRules();
  }

  function applyAccessRules() {
    const disabled = !state.access.canEnterData;
    const saveBtn = document.getElementById('saveAttendanceBtn');
    const markPresentBtn = document.getElementById('markPresentBtn');
    const markAbsentBtn = document.getElementById('markAbsentBtn');
    const markExcusedBtn = document.getElementById('markExcusedBtn');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const saveScheduleBtn = document.getElementById('saveScheduleBtn');
    const addScheduleRowBtn = document.getElementById('addScheduleRowBtn');
    const addStudentBtn = document.getElementById('addStudentBtn');
    const removeStudentsBtn = document.getElementById('removeStudentsBtn');
    saveBtn.disabled = disabled;
    markPresentBtn.disabled = disabled;
    markAbsentBtn.disabled = disabled;
    markExcusedBtn.disabled = disabled;
    saveSettingsBtn.disabled = disabled;
    saveScheduleBtn.disabled = disabled;
    addScheduleRowBtn.disabled = disabled;
    addStudentBtn.disabled = disabled;
    removeStudentsBtn.disabled = disabled;

    el.rosterBody.querySelectorAll('select[data-role="attendance"], [data-role="kemahiran"], [data-role="mastery"], [data-role="score"], [data-role="interest"], [data-role="note"]')
      .forEach(node => node.disabled = disabled);
    el.settingsBody.querySelectorAll('select[data-role="group-setting"]').forEach(node => node.disabled = disabled);
    el.settingsBody.querySelectorAll('input[data-role="student-select"]').forEach(node => node.disabled = disabled);
    el.scheduleBody.querySelectorAll('[data-role^="sch-"]').forEach(node => node.disabled = disabled);
  }

  function setSettingsStatus(msg, isError) {
    el.settingsStatus.textContent = msg;
    el.settingsStatus.style.color = isError ? '#d64550' : '#6a767d';
  }

  function setScheduleStatus(msg, isError) {
    el.scheduleStatus.textContent = msg;
    el.scheduleStatus.style.color = isError ? '#d64550' : '#6a767d';
  }

  function setDashboardStatus(msg, isError) {
    el.dashboardStatus.textContent = msg;
    el.dashboardStatus.style.color = isError ? '#d64550' : '#6a767d';
  }

  function gaugeStyle(percent) {
    const p = Number(percent || 0);
    // Baseline 10% -> red, 100% -> green
    const clamped = Math.max(10, Math.min(100, p));
    const ratio = (clamped - 10) / 90;
    const hue = Math.round(0 + (120 * ratio)); // 0 red -> 120 green
    return `background: linear-gradient(135deg, hsla(${hue}, 70%, 88%, 1), hsla(${hue}, 78%, 80%, 1));`;
  }

  function normalizeGroup(mode) {
    const raw = String(mode || '').toUpperCase();
    if (raw === 'PERDANA') return 'PERDANA';
    if (raw === 'BOTH' || raw === 'BM_MT' || raw === 'BM+MT') return 'BOTH';
    if (raw === 'MT') return 'MT';
    return 'BM';
  }

  function getErrMsg(err) {
    return (err && err.message) ? err.message : String(err);
  }

  function dayOptions(current) {
    const days = [
      { v: '7', t: 'Ahad' },
      { v: '1', t: 'Isnin' },
      { v: '2', t: 'Selasa' },
      { v: '3', t: 'Rabu' },
      { v: '4', t: 'Khamis' },
      { v: '5', t: 'Jumaat' },
      { v: '6', t: 'Sabtu' }
    ];
    const now = String(current || '1');
    return days.map(d => `<option value="${d.v}" ${selected(now, d.v)}>${d.t}</option>`).join('');
  }


  function handleError(err) {
    const message = (err && err.message) ? err.message : String(err);
    setStatus(message, true);
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }
</script>
